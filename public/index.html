<!DOCTYPE html>
<html lang="de-CH">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#ff5b8a" />
  <title>E Frag a di 💕</title>
  <meta name="description" content="Cati, ich han da e Frag a di…" />
  <meta name="robots" content="noindex" />
  <link
    rel="icon"
    href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='26'%3E%F0%9F%92%95%3C/text%3E%3C/svg%3E"
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- Sanft schwebende Herzen im Hintergrund (per JS befüllt) -->
  <div class="bg-hearts" aria-hidden="true"></div>

  <main class="stage">
    <!-- ───────────── SEITE 1 · Die Frage ───────────── -->
    <section id="screen-ask" class="screen is-active" aria-labelledby="ask-title">
      <div class="card">
        <div class="emoji-heart" aria-hidden="true">💖</div>
        <h1 id="ask-title" class="title">Date?</h1>

        <div class="btn-row" id="btn-row">
          <button id="btn-yes" class="btn btn-yes" type="button">Ja 💕</button>
          <button id="btn-no" class="btn btn-no" type="button">Nei</button>
        </div>

        <p id="no-taunt" class="taunt" aria-live="polite"></p>
      </div>
    </section>

    <!-- ───────────── SEITE 2 · Der Termin ───────────── -->
    <section id="screen-date" class="screen" aria-labelledby="date-title" hidden>
      <div class="card">
        <div class="emoji-heart" aria-hidden="true">🗓️</div>
        <h1 id="date-title" class="title">Welli ziit passt dir?</h1>

        <form id="date-form" novalidate>
          <div class="quick-chips" id="quick-chips" role="group" aria-label="Schnällwahl"></div>

          <label class="field">
            <input type="date" id="input-date" class="input" required autocomplete="off" aria-label="Tag" />
          </label>

          <label class="field">
            <input type="time" id="input-time" class="input" value="19:00" required autocomplete="off" aria-label="Ziit" />
          </label>

          <button id="btn-submit" class="btn btn-yes btn-block" type="submit">Bestätige 💌</button>
          <p id="form-error" class="form-error" aria-live="polite"></p>
        </form>
      </div>
    </section>

    <!-- ───────────── SEITE 3 · Danke ───────────── -->
    <section id="screen-done" class="screen" aria-labelledby="done-title" hidden>
      <div class="card">
        <div class="emoji-heart big-bounce" aria-hidden="true">💕</div>
        <h1 id="done-title" class="title">Ich freu mi uf di!</h1>
        <p class="subtitle" id="done-summary"></p>
        <p class="done-note" id="done-note"></p>
      </div>
    </section>
  </main>

  <!-- Vollbild-Effekt-Ebene für Konfetti &amp; Herzen -->
  <canvas id="fx" class="fx" aria-hidden="true"></canvas>

  <script src="app.js" defer></script>
</body>
</html>
